<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <link rel="stylesheet" href="contactpage.css" />
</head>

<body>
  <!-- ========== HEADER ========== -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">Biscuit & Batter</h1>
      <p class="site-tagline">Because everyday deserves something sweet!</p>
      <nav class="main-nav">
        <a href="homepage.html">Home</a>
        <a href="aboutme.html">About Me</a>
        <a href="contactpage.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <!-- ========== HERO BANNER ========== -->
    <section class="hero">
      <img src="images/contactbanner.jpg" alt="contact page banner showing blueberry and pistachio tarts" class="hero-img" />
    </section>

    <!-- ========== MAIN CONTENT ========== -->
    <section class="contact-section">
      <h2 class="section-title">Contact Me</h2>

      <form action="#" method="post">
        <label for="fullname">What is your name?</label>
        <input type="text" id="fullname" name="fullname" required />

        <label for="email">What is your email?</label>
        <input type="email" id="email" name="email" required />

        <label for="messagetype">What is this about?</label>
        <select id="messagetype" name="messagetype" required>
          <option value="">Select</option>
          <option value="recipe-request">I would like to request a recipe</option>
          <option value="baking-question">I have a baking question</option>
          <option value="other">Other comments or inquiries</option>
        </select>

        <label for="messagetext">Your message:</label>
        <textarea id="messagetext" name="messagetext" rows="10" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="site-footer">
    <p>© 2026 Biscuit & Batter</p>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">Pinterest</a>
      <a href="#">YouTube</a>
    </div>
  </footer>
</body>

</html>
